services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: km-backend
    ports:
      # 8001 on host (8000 is commonly occupied); 8000 inside the container.
      - "${KM_BACKEND_PORT:-8001}:8000"
    volumes:
      # Vial config — read-only mount. Default is the bundled sample for the
      # board currently in use; override with VIAL_CONFIG to point at your live
      # Vial export. Any board works — geometry is resolved per-keyboard at
      # parse time (backend/parsers/topology.py), not hardcoded in the frontend.
      - ${VIAL_CONFIG:-${HOME}/Projects/keyboard-manager/sample/beekeeb-36key.vil}:/data/mylayout.vil:ro
      # SQLite stats database — read-write, persisted on host
      - ${KEYSTAT_DB:-${HOME}/Library/Application Support/keyboard-manager}:/data/db
    environment:
      - VIAL_PATH=/data/mylayout.vil
      - DB_PATH=/data/db/keystat.db
      # native-helper runs on the macOS host; backend reaches it via host.docker.internal
      # 8766 to avoid clash with Hammerspoon's hs.httpserver on 8765.
      - HELPER_WS_URL=${HELPER_WS_URL:-ws://host.docker.internal:8766}
    # Belt-and-braces: Docker Desktop on macOS resolves host.docker.internal
    # automatically, but the explicit mapping helps with Colima/older Compose
    # and documents the requirement.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: km-frontend
    ports:
      - "${KM_FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
