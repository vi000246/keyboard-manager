server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API + WebSocket through nginx so the browser only ever talks to :8080.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/live {
    proxy_pass http://backend:8000/api/live;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  location / {
    try_files $uri $uri/ /index.html;
    # Local personal tool: never serve stale HTML/CSS/JS. ETag still lets the
    # browser revalidate cheaply (304s), but a rebuilt asset always wins —
    # otherwise a long-lived tab keeps an old style.css and the UI "跑版".
    add_header Cache-Control "no-cache";
  }
}
