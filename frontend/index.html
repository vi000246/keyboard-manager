<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>keyboard-manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>keyboard-manager</h1>
    <nav>
      <button data-view="static" class="active">Static Viewer</button>
      <button data-view="cheatsheet">Cheatsheet</button>
      <button data-view="interactive">Interactive</button>
      <button data-view="stats">Stats</button>
      <button data-view="keyname">Key Name Map</button>
    </nav>
    <div class="layout-source">
      <button id="layout-upload-btn" type="button" title="Replace the active layout with a Vial .vil or a ZMK keymap-JSON export from disk">
        Load .vil / ZMK…
      </button>
      <input id="layout-upload-input" type="file" accept=".vil,.json,application/json" hidden>
      <button id="layout-revert-btn" type="button" class="hidden" title="Switch back to the default .vil">
        Revert
      </button>
      <span id="layout-source-label"></span>
    </div>
  </header>

  <main>
    <section id="view-static" class="view">
      <p class="placeholder">loading layout…</p>
    </section>
    <section id="view-cheatsheet" class="view hidden">
      <p class="placeholder">loading cheatsheet…</p>
    </section>
    <section id="view-interactive" class="view hidden">
      <p class="placeholder">click this tab to start the live simulator</p>
    </section>
    <section id="view-stats" class="view hidden">
      <p class="placeholder">loading stats…</p>
    </section>
    <section id="view-keyname" class="view hidden">
      <p class="placeholder">loading key name map…</p>
    </section>
  </main>

  <script src="keycode-format.js"></script>
  <script src="aliases.js"></script>
  <script src="grid-render.js"></script>
  <script src="key-tooltip.js"></script>
  <script src="static-viewer.js"></script>
  <script src="cheatsheet.js"></script>
  <script src="heatmap.js"></script>
  <script src="stats.js"></script>
  <script src="interactive.js"></script>
  <script src="keyname-map.js"></script>
  <script src="vial-upload.js"></script>
  <script src="app.js"></script>
</body>
</html>
