<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>keyboard-manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>keyboard-manager</h1>
    <nav>
      <button data-view="static" class="active">Static Viewer</button>
      <button data-view="interactive">Interactive</button>
      <button data-view="stats">Stats</button>
    </nav>
    <label class="layer-picker">
      Layer:
      <select id="layer-select">
        <option value="0">0 — BASE</option>
        <option value="1">1 — NAV</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4 — MEDIA</option>
        <option value="5">5</option>
      </select>
    </label>
  </header>

  <main>
    <section id="view-static" class="view">
      <p class="placeholder">loading layout…</p>
    </section>
    <section id="view-interactive" class="view hidden">
      <p class="placeholder">M4 — Interactive simulator. WebSocket subscribes to native-helper events.</p>
    </section>
    <section id="view-stats" class="view hidden">
      <p class="placeholder">loading stats…</p>
    </section>
  </main>

  <script src="keycode-format.js"></script>
  <script src="grid-render.js"></script>
  <script src="static-viewer.js"></script>
  <script src="stats.js"></script>
  <script src="app.js"></script>
</body>
</html>
